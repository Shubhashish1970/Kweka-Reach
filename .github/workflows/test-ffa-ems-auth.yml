# One-off / manual test: EMS UAT authenticate using GitHub Actions secrets.
# Does not print secret values. Response body is logged (may contain session tokens).
name: Test FFA EMS Authenticate

on:
  workflow_dispatch:

jobs:
  test-authenticate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate secrets are configured
        env:
          FFA_API_URL: ${{ secrets.FFA_API_URL }}
          FFA_EMS_CTID: ${{ secrets.FFA_EMS_CTID }}
          FFA_EMS_TOKEN: ${{ secrets.FFA_EMS_TOKEN }}
          FFA_EMS_SECTKEY: ${{ secrets.FFA_EMS_SECTKEY }}
        run: |
          missing=0
          for name in FFA_API_URL FFA_EMS_CTID FFA_EMS_TOKEN FFA_EMS_SECTKEY; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            else
              echo "✅ $name is set"
            fi
          done
          exit $missing

      - name: POST /api/EMS/authenticate
        env:
          FFA_API_URL: ${{ secrets.FFA_API_URL }}
          FFA_EMS_CTID: ${{ secrets.FFA_EMS_CTID }}
          FFA_EMS_TOKEN: ${{ secrets.FFA_EMS_TOKEN }}
          FFA_EMS_SECTKEY: ${{ secrets.FFA_EMS_SECTKEY }}
        run: |
          set -euo pipefail
          BASE="${FFA_API_URL%/api}"
          URL="${BASE}/api/EMS/authenticate"
          echo "Target: $URL"
          HTTP_CODE=$(curl -sS -o /tmp/ems_auth_response.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg ctid "$FFA_EMS_CTID" \
              --arg token "$FFA_EMS_TOKEN" \
              --arg sectkey "$FFA_EMS_SECTKEY" \
              '{ctid: $ctid, token: $token, sectkey: $sectkey}')")
          echo "HTTP status: $HTTP_CODE"
          echo "--- Response body ---"
          jq . /tmp/ems_auth_response.json 2>/dev/null || cat /tmp/ems_auth_response.json
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Authenticate succeeded"
            exit 0
          fi
          echo "::error::Authenticate failed with HTTP $HTTP_CODE"
          exit 1
