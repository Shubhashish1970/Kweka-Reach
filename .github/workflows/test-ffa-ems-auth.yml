# Manual test: EMS UAT authenticate + activities GET using GitHub Actions secrets.
name: Test FFA EMS Authenticate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test-ffa-ems-auth.yml'

jobs:
  test-authenticate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate required secrets
        env:
          FFA_API_URL: ${{ secrets.FFA_API_URL }}
          FFA_EMS_CTID: ${{ secrets.FFA_EMS_CTID }}
          FFA_EMS_SECTKEY: ${{ secrets.FFA_EMS_SECTKEY }}
          FFA_EMS_TOKEN: ${{ secrets.FFA_EMS_TOKEN }}
        run: |
          missing=0
          for name in FFA_API_URL FFA_EMS_CTID FFA_EMS_SECTKEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            else
              echo "✅ $name is set"
            fi
          done
          if [ -n "${FFA_EMS_TOKEN:-}" ]; then
            echo "✅ FFA_EMS_TOKEN is set"
          else
            echo "::warning::FFA_EMS_TOKEN is empty — sending empty token in request body"
          fi
          exit $missing

      - name: POST authenticate and extract session token
        env:
          FFA_API_URL: ${{ secrets.FFA_API_URL }}
          FFA_EMS_CTID: ${{ secrets.FFA_EMS_CTID }}
          FFA_EMS_TOKEN: ${{ secrets.FFA_EMS_TOKEN }}
          FFA_EMS_SECTKEY: ${{ secrets.FFA_EMS_SECTKEY }}
        run: |
          set -euo pipefail
          # FFA_API_URL: full auth URL, or base ending in /api (we append /EMS/authenticate)
          URL="${FFA_API_URL%/}"
          if [[ "$URL" != *authenticate* ]]; then
            if [[ "$URL" == */api ]]; then
              URL="${URL}/EMS/authenticate"
            else
              URL="${URL}/api/EMS/authenticate"
            fi
          fi
          echo "Target: $URL"
          HTTP_CODE=$(curl -sS -o /tmp/ems_auth_response.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg ctid "$FFA_EMS_CTID" \
              --arg token "${FFA_EMS_TOKEN:-}" \
              --arg sectkey "$FFA_EMS_SECTKEY" \
              '{ctid: $ctid, token: $token, sectkey: $sectkey}')")
          echo "HTTP status: $HTTP_CODE"
          echo "--- Response body ---"
          jq . /tmp/ems_auth_response.json 2>/dev/null || cat /tmp/ems_auth_response.json

          STYP=$(jq -r '.styp // empty' /tmp/ems_auth_response.json 2>/dev/null || true)
          SENM=$(jq -r '.senm // empty' /tmp/ems_auth_response.json 2>/dev/null || true)
          if [ "$STYP" = "E" ] || [ "$STYP" = "e" ]; then
            echo "::error::EMS returned error: ${SENM:-unknown}"
            exit 1
          fi

          SESSION_TOKEN=$(jq -r '
            if (.odat | type) == "array" and (.odat | length) > 0 then .odat[0].token // empty
            elif (.odat | type) == "object" then .odat.token // empty
            elif .token != null and .token != "" then .token
            else empty end
          ' /tmp/ems_auth_response.json)

          if [ -z "${SESSION_TOKEN:-}" ] || [ "$SESSION_TOKEN" = "null" ]; then
            echo "::error::Authenticate did not return odat[0].token"
            exit 1
          fi

          echo "✅ EMS session token obtained (length: ${#SESSION_TOKEN} chars)"
          echo "::add-mask::$SESSION_TOKEN"
          echo "$SESSION_TOKEN" > /tmp/ems_session_token.txt

      - name: GET /api/EMS/activities
        env:
          FFA_API_URL: ${{ secrets.FFA_API_URL }}
          FFA_EMS_DEFAULT_DATE_FROM: ${{ secrets.FFA_EMS_DEFAULT_DATE_FROM }}
        run: |
          set -euo pipefail
          SESSION_TOKEN=$(cat /tmp/ems_session_token.txt)
          BASE="${FFA_API_URL%/}"
          if [[ "$BASE" == */authenticate ]]; then
            BASE="${BASE%/EMS/authenticate}"
          fi
          if [[ "$BASE" != */api ]]; then
            BASE="${BASE}/api"
          fi
          FOUND=0
          for DATE_FROM in "${FFA_EMS_DEFAULT_DATE_FROM:-01/05/2025}" "01/01/2026" "01/04/2026" "20/05/2026" "26/05/2026"; do
            DATE_ENC=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$DATE_FROM', safe=''))")
            ACTIVITIES_URL="${BASE}/EMS/activities?limit=100&dateFrom=${DATE_ENC}"
            echo "--- dateFrom: $DATE_FROM ---"
            HTTP_CODE=$(curl -sS -o /tmp/ems_activities_response.json -w "%{http_code}" \
              -X GET "$ACTIVITIES_URL" \
              -H "Authorization: Bearer $SESSION_TOKEN" \
              -H "Content-Type: application/json")
            echo "HTTP status: $HTTP_CODE"
            jq -r 'if .Success != null then "Success: \(.Success), message: \(.message // "n/a")" elif .success != null then "success: \(.success)" else empty end' /tmp/ems_activities_response.json 2>/dev/null || true
            COUNT=$(jq -r 'if .data.activities then (.data.activities | length) elif .activities then (.activities | length) else 0 end' /tmp/ems_activities_response.json 2>/dev/null || echo "0")
            if [ "${COUNT:-0}" -gt 0 ] 2>/dev/null; then
              echo "✅ Activities found: $COUNT (dateFrom=$DATE_FROM)"
              FOUND=1
              cp /tmp/ems_activities_response.json /tmp/ems_activities_hit.json
              break
            fi
            if jq -e '.Success == true or .success == true' /tmp/ems_activities_response.json >/dev/null 2>&1; then
              echo "✅ Success true (dateFrom=$DATE_FROM) — inspect body"
              FOUND=1
              cp /tmp/ems_activities_response.json /tmp/ems_activities_hit.json
              break
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            cp /tmp/ems_activities_hit.json /tmp/ems_activities_response.json
          fi
          echo "--- Response summary ---"
          if [ ! -s /tmp/ems_activities_response.json ]; then
            echo "(empty body)"
            exit 1
          fi
          jq -r '
            if type == "object" then
              "styp: \(.styp // "n/a")",
              "senm: \(.senm // "n/a")",
              (if .success != null then "success: \(.success)" else empty end),
              (if .data.activities then "activities_count: \(.data.activities | length)" else empty end),
              (if .odat then "odat_type: \(.odat | type)" else empty end)
            else "response_type: \(type)"
            end
          ' /tmp/ems_activities_response.json 2>/dev/null || true
          echo "--- First 2500 chars of body ---"
          head -c 2500 /tmp/ems_activities_response.json
          echo ""
          COUNT=$(jq -r '
            if .data.activities then (.data.activities | length)
            elif .Data.activities then (.Data.activities | length)
            elif .activities then (.activities | length)
            elif (.odat | type) == "array" then (.odat | length)
            else 0 end
          ' /tmp/ems_activities_response.json 2>/dev/null || echo "0")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            STYP=$(jq -r '.styp // empty' /tmp/ems_activities_response.json 2>/dev/null || true)
            if [ "$STYP" = "E" ] || [ "$STYP" = "e" ]; then
              SENM=$(jq -r '.senm // "unknown"' /tmp/ems_activities_response.json)
              echo "::error::EMS activities error: $SENM"
              exit 1
            fi
            if jq -e '.Success == false' /tmp/ems_activities_response.json >/dev/null 2>&1; then
              MSG=$(jq -r '.message // "No data"' /tmp/ems_activities_response.json)
              echo "::warning::EMS Success=false: $MSG"
              exit 0
            fi
            if [ "${COUNT:-0}" -gt 0 ] 2>/dev/null; then
              echo "✅ Activities data received (count: $COUNT)"
              exit 0
            fi
            if jq -e '.success == true or .Success == true' /tmp/ems_activities_response.json >/dev/null 2>&1; then
              echo "✅ HTTP 200 with success flag (check activities array shape in body above)"
              exit 0
            fi
            echo "::warning::HTTP 200 but no activities array detected — inspect body above"
            exit 0
          fi
          echo "::error::Activities request failed with HTTP $HTTP_CODE"
          exit 1
